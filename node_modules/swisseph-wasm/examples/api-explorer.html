<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiss Ephemeris API Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200">
        <div class="container mx-auto px-4 py-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">
                        Swiss Ephemeris API Explorer
                    </h1>
                </div>
                <div class="text-right">
                    <div id="status" class="text-sm text-gray-500">Loading...</div>
                    <div id="version" class="text-xs text-gray-400 mt-1"></div>
                </div>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-6">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
            <!-- Sidebar - Method Categories -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded border border-gray-200 p-4 sticky top-4">
                    <h2 class="text-sm font-semibold text-gray-900 mb-3">
                        Method Categories
                    </h2>
                    
                    <div class="space-y-1" id="categories">
                        <!-- Categories will be populated by JavaScript -->
                    </div>
                </div>
            </div>

            <!-- Main Content - Method Details -->
            <div class="lg:col-span-3">
                <!-- Welcome Message -->
                <div id="welcome" class="bg-white rounded border border-gray-200 p-6 mb-4">
                    <h2 class="text-lg font-semibold text-gray-900 mb-2">API Explorer</h2>
                    <p class="text-sm text-gray-600 mb-4">
                        Test all Swiss Ephemeris methods. Select a category to begin.
                    </p>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-gray-50 rounded p-3 border border-gray-200 text-center">
                            <div class="text-2xl font-bold text-gray-900">63</div>
                            <div class="text-xs text-gray-600">Methods</div>
                        </div>
                        <div class="bg-gray-50 rounded p-3 border border-gray-200 text-center">
                            <div class="text-2xl font-bold text-gray-900">9</div>
                            <div class="text-xs text-gray-600">Categories</div>
                        </div>
                    </div>
                </div>

                <!-- Method Details Container -->
                <div id="methodDetails" class="space-y-4">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>
        </div>
    </div>

                            { name: 'suppressZero', type: 'select', default: 'true', options: ['true', 'false'] }
                        ],
                        example: 'swisseph.cs2timestr(4500000, " ", true)',
                        expectedResult: '"12 30"'
                    },
                    {
                        name: 'cs2lonlatstr',
                        description: 'Centiseconds to lon/lat string',
                        params: [
                            { name: 'cs', type: 'number', default: 44444160 },
                            { name: 'pchar', type: 'text', default: 'E' },
                            { name: 'mchar', type: 'text', default: 'W' }
                        ],
                        example: 'swisseph.cs2lonlatstr(44444160, "E", "W")',
                        expectedResult: '"123E27\'22"'
                    },
                    {
                        name: 'cs2degstr',
                        description: 'Centiseconds to degree string (mod 30)',
                        params: [{ name: 'cs', type: 'number', default: 44444160 }],
                        example: 'swisseph.cs2degstr(44444160)',
                        expectedResult: '" 3°27\'21"'
                    },
                    {
                        name: 'azalt',
                        description: 'Calculate azimuth/altitude',
                        params: [
                            { name: 'jd_ut', type: 'number', default: 2451545.0 },
                            { name: 'calc_flag', type: 'select', default: 'SE_EQU2HOR', options: ['SE_EQU2HOR'] },
                            { name: 'geopos', type: 'text', default: '8,47,400' },
                            { name: 'atpress', type: 'number', default: 1013.25 },
                            { name: 'attemp', type: 'number', default: 15.0 },
                            { name: 'xin', type: 'text', default: '100,10,1' }
                        ],
                        example: 'swisseph.azalt(2451545.0, swisseph.SE_EQU2HOR, [8,47,400], 1013.25, 15.0, [100,10,1])',
                        expectedResult: '{ azimuth, altitude, ... }'
                    },
                    {
                        name: 'azalt_rev',
                        description: 'Reverse azimuth/altitude',
                        params: [
                            { name: 'jd_ut', type: 'number', default: 2451545.0 },
                            { name: 'calc_flag', type: 'select', default: 'SE_HOR2EQU', options: ['SE_HOR2EQU'] },
                            { name: 'geopos', type: 'text', default: '8,47,400' },
                            { name: 'xin', type: 'text', default: '180,45,1' }
                        ],
                        example: 'swisseph.azalt_rev(2451545.0, swisseph.SE_HOR2EQU, [8,47,400], [180,45,1])',
                        expectedResult: '{ ra, dec, ... }'
                    },
                    {
                        name: 'cotrans',
                        description: 'Coordinate transformation',
                        params: [
                            { name: 'xpo', type: 'text', default: '100,10,1' },
                            { name: 'eps', type: 'number', default: 23.44 }
                        ],
                        example: 'swisseph.cotrans([100,10,1], 23.44)',
                        expectedResult: '[x, y, z]'
                    },
                    {
                        name: 'cotrans_sp',
                        description: 'Coordinate transformation with speed',
                        params: [
                            { name: 'xpo', type: 'text', default: '100,10,1,0,0,0' },
                            { name: 'eps', type: 'number', default: 23.44 }
                        ],
                        example: 'swisseph.cotrans_sp([100,10,1,0,0,0], 23.44)',
                        expectedResult: '[x, y, z, dx, dy, dz]'
                    },
                    {
                        name: 'get_tid_acc',
                        description: 'Get tidal acceleration',
                        params: [],
                        example: 'swisseph.get_tid_acc()',
                        expectedResult: '-25.8'
                    },
                    {
                        name: 'set_tid_acc',
                        description: 'Set tidal acceleration',
                        params: [{ name: 'acc', type: 'number', default: 0.0 }],
                        example: 'swisseph.set_tid_acc(0.0)',
                        expectedResult: 'void'
                    }
                ]
            },
            'Nodes & Apsides (2 methods)': {
                methods: [
                    {
                        name: 'nod_aps',
                        description: 'Calculate nodes and apsides',
                        params: [
                            { name: 'jd_et', type: 'number', default: 2451545.0 },
                            { name: 'planet', type: 'select', default: 'SE_MOON', options: ['SE_MOON', 'SE_MERCURY', 'SE_VENUS'] },
                            { name: 'flags', type: 'select', default: 'SEFLG_SWIEPH', options: ['SEFLG_SWIEPH'] },
                            { name: 'method', type: 'number', default: 0 }
                        ],
                        example: 'swisseph.nod_aps(2451545.0, swisseph.SE_MOON, swisseph.SEFLG_SWIEPH, 0)',
                        expectedResult: '{ asc_node, desc_node, perihelion, aphelion }'
                    },
                    {
                        name: 'nod_aps_ut',
                        description: 'Nodes and apsides (UT)',
                        params: [
                            { name: 'jd_ut', type: 'number', default: 2451545.0 },
                            { name: 'planet', type: 'select', default: 'SE_MOON', options: ['SE_MOON', 'SE_MERCURY', 'SE_VENUS'] },
                            { name: 'flags', type: 'select', default: 'SEFLG_SWIEPH', options: ['SEFLG_SWIEPH'] },
                            { name: 'method', type: 'number', default: 0 }
                        ],
                        example: 'swisseph.nod_aps_ut(2451545.0, swisseph.SE_MOON, swisseph.SEFLG_SWIEPH, 0)',
                        expectedResult: '{ asc_node, desc_node, perihelion, aphelion }'
                    }
                ]
            }
        };

        // Initialize
        async function init() {
            try {
                statusEl.textContent = 'Initializing...';
                swisseph = new SwissEph();
                await swisseph.initSwissEph();
                
                const version = swisseph.version();
                versionEl.textContent = `Swiss Ephemeris v${version}`;
                statusEl.textContent = 'Ready';
                statusEl.classList.add('text-green-600', 'font-medium');
                
                renderCategories();
            } catch (error) {
                statusEl.textContent = 'Error: ' + error.message;
                statusEl.classList.add('text-red-600');
            }
        }

        function renderCategories() {
            categoriesEl.innerHTML = Object.entries(methodCategories).map(([category, data]) => `
                <button onclick="showCategory('${category}')" 
                        class="w-full text-left px-3 py-2 rounded bg-white hover:bg-blue-50 transition-all border border-gray-200 hover:border-blue-400 group text-sm">
                    <div class="flex items-center justify-between">
                        <div>
                            <div class="font-medium text-gray-900">${category}</div>
                            <div class="text-xs text-gray-500">${data.methods.length} methods</div>
                        </div>
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                        </svg>
                    </div>
                </button>
            `).join('');
        }

        window.showCategory = function(category) {
            const data = methodCategories[category];
            document.getElementById('welcome').style.display = 'none';
            
            methodDetailsEl.innerHTML = `
                <div class="bg-white rounded border border-gray-200 p-4 mb-4">
                    <h2 class="text-lg font-semibold text-gray-900">${category}</h2>
                    <p class="text-sm text-gray-600">${data.methods.length} methods</p>
                </div>
                
                ${data.methods.map((method, idx) => `
                    <div class="bg-white rounded border border-gray-200 p-4 mb-4">
                        <div class="flex items-start justify-between mb-3">
                            <div class="flex-1">
                                <h3 class="text-base font-semibold text-blue-600">${method.name}()</h3>
                                <p class="text-sm text-gray-600 mt-1">${method.description}</p>
                            </div>
                            <button onclick="runMethod('${category}', ${idx})" 
                                    class="ml-3 px-3 py-1 bg-blue-600 text-white rounded hover:bg-blue-700 transition-all text-sm font-medium">
                                Run
                            </button>
                        </div>
                        
                        ${method.params.length > 0 ? `
                            <div class="space-y-2 mb-3">
                                ${method.params.map((param, pidx) => `
                                    <div class="grid grid-cols-4 gap-2 items-center text-sm">
                                        <label class="text-gray-700 font-medium">${param.name}:</label>
                                        ${param.type === 'select' ? `
                                            <select id="${method.name}_${pidx}" class="col-span-3 bg-white border border-gray-300 rounded px-2 py-1 text-gray-900 text-sm">
                                                ${param.options.map(opt => `<option value="${opt}" ${opt === param.default ? 'selected' : ''}>${opt}</option>`).join('')}
                                            </select>
                                        ` : `
                                            <input type="${param.type}" id="${method.name}_${pidx}" value="${param.default}" 
                                                   class="col-span-3 bg-white border border-gray-300 rounded px-2 py-1 text-gray-900 text-sm">
                                        `}
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                        
                        <details class="mb-2">
                            <summary class="cursor-pointer text-xs text-gray-600 hover:text-gray-900 font-medium">Show Example</summary>
                            <div class="bg-gray-50 rounded p-2 mt-2 border border-gray-200">
                                <code class="text-xs text-gray-900 block">${method.example}</code>
                                <div class="text-xs text-gray-500 mt-1">Expected: <code>${method.expectedResult}</code></div>
                            </div>
                        </details>
                        
                        <div id="result_${method.name}" class="hidden bg-green-50 rounded p-3 border border-green-200 mt-2">
                            <div class="text-xs text-gray-600 font-medium mb-1">Result:</div>
                            <pre class="text-xs text-gray-900 overflow-x-auto"></pre>
                        </div>
                    </div>
                `).join('')}
            `;
        };

        window.runMethod = function(category, methodIdx) {
            const method = methodCategories[category].methods[methodIdx];
            const resultEl = document.getElementById(`result_${method.name}`);
            
            try {
                // Get parameter values
                const params = method.params.map((param, idx) => {
                    const input = document.getElementById(`${method.name}_${idx}`);
                    let value = input.value;
                    
                    if (param.type === 'number') {
                        value = parseFloat(value);
                    } else if (param.type === 'select' && value.startsWith('SE')) {
                        value = swisseph[value];
                    } else if (param.type === 'text' && value.includes(',')) {
                         // Parse "1,2,3" into [1, 2, 3]
                         value = value.split(',').map(v => parseFloat(v.trim()));
                    }
                    
                    return value;
                });
                
                // Call the method
                const result = swisseph[method.name](...params);
                
                // Display result
                resultEl.classList.remove('hidden');
                resultEl.querySelector('pre').textContent = JSON.stringify(result, null, 2);
            } catch (error) {
                resultEl.classList.remove('hidden');
                resultEl.classList.add('from-red-500/20', 'to-orange-500/20', 'border-red-500/30');
                resultEl.querySelector('pre').textContent = 'Error: ' + error.message;
            }
        };

        init();
    </script>
</body>
</html>
